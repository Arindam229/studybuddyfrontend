name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop
        
      - name: Create placeholder .env
        shell: pwsh
        run: echo "API_URL=https://placeholder.api.com/api" | Out-File -FilePath .env -Encoding ASCII
        
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Create Windows Installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (Test-Path $iscc) {
            & $iscc "windows\StudyBuddy.iss"
          } else {
            Write-Host "Warning: Inno Setup (ISCC.exe) not found. Skipping installer creation."
          }
          
      - name: Upload Windows Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-windows-setup
          path: build\windows\installer\StudyBuddySetup.exe
          if-no-files-found: warn
