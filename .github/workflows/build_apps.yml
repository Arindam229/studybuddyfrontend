name: Build Multi-Platform Apps
# Forced re-trigger comment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create placeholder .env
        run: echo "API_URL=https://placeholder.api.com/api" > .env
      - name: Install Dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop
      - name: Create placeholder .env
        shell: pwsh
        run: echo "API_URL=https://placeholder.api.com/api" | Out-File -FilePath .env -Encoding ASCII
      - name: Install Dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Create Windows Installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          & $iscc "windows\StudyBuddy.iss"
      - name: Upload Windows Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-windows-setup
          path: build\windows\installer\StudyBuddySetup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Enable macOS Build
        run: flutter config --enable-macos-desktop
      - name: Create placeholder .env
        run: echo "API_URL=https://placeholder.api.com/api" > .env
      - name: Install Dependencies
        run: flutter pub get
      - name: Build macOS
        run: |
          flutter build macos --release \
            -- \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Create macOS DMG
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 2 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app bundle."
            exit 1
          fi
          create-dmg \
            --volname "StudyBuddy Setup" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "StudyBuddy.app" 200 190 \
            --hide-extension "StudyBuddy.app" \
            --app-drop-link 600 185 \
            "StudyBuddy.dmg" \
            "$APP_PATH" || true
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: studybuddy-macos-dmg
          path: StudyBuddy.dmg
