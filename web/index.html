<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="StudyBuddy AI - Your personal AI-powered study assistant.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="StudyBuddy AI">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2" />
  <link rel="shortcut icon" type="image/png" href="favicon.png?v=2" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=2">

  <title>StudyBuddy AI</title>
  <link rel="manifest" href="manifest.json">
  <!-- Agora Web SDK (matching the bridge script version) -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
  <!-- Local Iris Bridge (downloaded to fix TypeError: createIrisApiEngine) -->
  <script src="iris-web-rtc.js"></script>
  <script>
    // Critical fix: Ensure Iris engine is correctly mapped
    (function () {
      var checkIris = function () {
        if (window.IrisWebRtc || window.IrisWebRtc_N) {
          window.IrisWebRtc = window.IrisWebRtc || window.IrisWebRtc_N;
          console.log("[AGORA FIX] Iris bridge initialized locally");
        } else {
          setTimeout(checkIris, 100);
        }
      };
      checkIris();
    })();
  </script>
</head>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
